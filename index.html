<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación Allyson</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: 'Montserrat', sans-serif;
    background: linear-gradient(160deg, #5f6f73, #c0c0c0);
    color:white;
    text-align:center;
    overflow-x:hidden;
}

/* PORTADA */
.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.hero h1{
    font-family: 'Playfair Display', serif;
    font-size:50px;
    letter-spacing:2px;
}

.hero p{
    margin-top:10px;
    font-size:18px;
    opacity:0.9;
}

/* BOTÓN */
.btn{
    margin-top:30px;
    padding:12px 28px;
    background:white;
    color:#5f6f73;
    border-radius:30px;
    text-decoration:none;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.05);
}

/* SECCIONES */
.section{
    padding:60px 20px;
}

.card{
    background: rgba(255,255,255,0.15);
    border-radius:20px;
    padding:25px;
    margin:20px auto;
    max-width:400px;
    backdrop-filter: blur(12px);
}

h2{
    font-family: 'Playfair Display', serif;
    margin-bottom:10px;
}

/* BOTÓN FLOTANTE */
.whatsapp{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25D366;
    color:white;
    padding:15px;
    border-radius:50%;
    text-decoration:none;
    font-size:20px;
}
</style>
</head>

<body>

<!-- PORTADA -->
<div class="hero">
    <h1>Allyson Ortega</h1>
    <p>Estás invitado a celebrar</p>
    <a href="#info" class="btn">Ver invitación</a>
</div>

<!-- INFO -->
<div id="info" class="section">

    <div class="card">
        <h2>📅 Fecha</h2>
        <p>20 de junio</p>
    </div>

    <div class="card">
        <h2>⏰ Hora</h2>
        <p>A partir de las 12:00</p>
    </div>

    <div class="card">
        <h2>👗 Dress Code</h2>
        <p>Ropa casual y traje de baño</p>
    </div>

    <div class="card">
        <h2>📍 Ubicación</h2>
        <a href="https://share.google/lII68GgMTj6nxDVPl" class="btn">Abrir mapa</a>
    </div>

    <div class="card">
        <h2>📲 Confirmación</h2>
        <p>Haz clic para confirmar</p>
    </div>

</div>

<!-- BOTÓN WHATS -->
<a class="whatsapp" href="https://wa.me/525661052234">💬</a>

</body>
</html>
