<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@300;500&display=swap" rel="stylesheet">

<title>Invitación Allyson</title>

<style>
body{
    margin:0;
    background: linear-gradient(135deg, #5f6f73, #cfd8dc);
    font-family: 'Cormorant Garamond', serif;
    color:#2c3e50;
    text-align:center;
}

/* efecto marmol suave */
body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:url('https://www.transparenttextures.com/patterns/marble.png');
    opacity:0.3;
    z-index:-1;
}

/* animaciones */
.fade{
    opacity:0;
    transform: translateY(40px);
    transition:1.2s ease;
}
.fade.show{
    opacity:1;
    transform: translateY(0);
}

/* portada */
.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

h1{
    font-family:'Great Vibes';
    font-size:65px;
    color:#1f2f3a;
}

.subtitle{
    font-size:20px;
}

/* tarjetas */
.card{
    border:1px solid #b0bec5;
    background: rgba(255,255,255,0.6);
    margin:20px;
    padding:25px;
    border-radius:20px;
    backdrop-filter: blur(10px);
}

/* botones */
.btn{
    display:inline-block;
    padding:12px 25px;
    background: linear-gradient(135deg, #5f6f73, #90a4ae);
    color:white;
    border-radius:30px;
    text-decoration:none;
    margin-top:10px;
}

/* contador */
#countdown{
    font-size:28px;
    margin-top:10px;
}

/* mapa */
.map{
    width:80%;
    border-radius:20px;
    margin-top:15px;
    box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

/* dress */
.dress{
    font-family:'Great Vibes';
    font-size:40px;
}

/* botones RSVP */
.rsvp button{
    background: linear-gradient(135deg, #5f6f73, #90a4ae);
    border:none;
    padding:15px 25px;
    margin:10px;
    border-radius:30px;
    color:white;
    font-size:18px;
}

/* whatsapp */
.whatsapp{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#1f2f3a;
    color:white;
    padding:15px;
    border-radius:50%;
    text-decoration:none;
}
</style>
</head>

<body>

<!-- PORTADA -->
<div class="hero fade">
    <h1>Allyson Ortega</h1>
    <p class="subtitle">Estás invitado a esta celebración</p>
</div>

<!-- FECHA -->
<div class="card fade">
    <h2>20 de junio</h2>
    <p>A partir de las 12:00</p>
</div>

<!-- CONTADOR -->
<div class="card fade">
    <h2>Faltan</h2>
    <div id="countdown"></div>
</div>

<!-- UBICACIÓN -->
<div class="card fade">
    <h2>Ubicación</h2>
    <a href="https://share.google/lII68GgMTj6nxDVPl">
        <img src="https://maps.googleapis.com/maps/api/staticmap?center=Ecatepec,Mexico&zoom=15&size=600x300&markers=color:red|Ecatepec,Mexico" class="map">
    </a>
</div>

<!-- DRESS -->
<div class="card fade">
    <div class="dress">Dress Code</div>
    <p>Ropa casual y traje de baño</p>
</div>

<!-- RSVP -->
<div class="card fade">
    <h2>Confirma tu asistencia</h2>
    <div class="rsvp">
        <button onclick="window.open('https://wa.me/525661052234')">Sí asistiré</button>
        <button onclick="window.open('https://wa.me/525661052234')">No asistiré</button>
    </div>
</div>

<!-- FINAL -->
<div class="fade">
    <h1>Te esperamos</h1>
</div>

<a class="whatsapp" href="https://wa.me/525661052234">💬</a>

<script>
// animaciones
const faders = document.querySelectorAll('.fade');
window.addEventListener('scroll', ()=>{
    faders.forEach(el=>{
        if(el.getBoundingClientRect().top < window.innerHeight - 100){
            el.classList.add('show');
        }
    });
});

// contador
const countDate = new Date("June 20, 2026 12:00:00").getTime();

setInterval(()=>{
    const now = new Date().getTime();
    const gap = countDate - now;

    const d = Math.floor(gap / (1000*60*60*24));
    const h = Math.floor((gap % (1000*60*60*24)) / (1000*60*60));
    const m = Math.floor((gap % (1000*60*60)) / (1000*60));
    const s = Math.floor((gap % (1000*60)) / 1000);

    document.getElementById("countdown").innerHTML =
    `${d}d : ${h}h : ${m}m : ${s}s`;

},1000);
</script>

</body>
</html>
