<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<title>Invitación Allyson</title>

<style>
body{
    margin:0;
    font-family: 'Montserrat', sans-serif;
    background: url('https://i.imgur.com/8IuucQZ.jpg');
    background-size: cover;
    text-align:center;
    color:#c0392b;
}

/* animaciones */
.fade{
    opacity:0;
    transform: translateY(40px);
    transition:1s;
}
.fade.show{
    opacity:1;
    transform: translateY(0);
}

/* portada */
.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

h1{
    font-family: 'Great Vibes', cursive;
    font-size:70px;
}

/* secciones */
.section{
    padding:50px 20px;
}

.card{
    border:2px solid gold;
    padding:20px;
    margin:20px;
    border-radius:20px;
    background: rgba(255,255,255,0.7);
}

/* botones */
.btn{
    display:inline-block;
    padding:12px 25px;
    background:gold;
    border-radius:30px;
    text-decoration:none;
    color:black;
    margin-top:10px;
}

/* contador */
#countdown{
    font-size:30px;
    margin-top:20px;
}

/* dress code */
.dress{
    font-family:'Great Vibes';
    font-size:40px;
}

/* botones RSVP */
.rsvp button{
    background:gold;
    border:none;
    padding:15px 30px;
    margin:10px;
    border-radius:30px;
    font-size:18px;
}

/* whatsapp */
.whatsapp{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25D366;
    color:white;
    padding:15px;
    border-radius:50%;
    text-decoration:none;
}
</style>
</head>

<body>

<!-- PORTADA -->
<div class="hero fade">
    <h1>Allyson Ortega</h1>
    <p>Estás invitado a esta fiesta</p>
</div>

<!-- FECHA -->
<div class="section fade">
    <div class="card">
        <h2>20 de Junio</h2>
        <p>A partir de las 12:00</p>
    </div>
</div>

<!-- CONTADOR -->
<div class="section fade">
    <h2>Faltan</h2>
    <div id="countdown"></div>
</div>

<!-- UBICACIÓN -->
<div class="section fade">
    <h2>Ubicación</h2>
    <a href="https://share.google/lII68GgMTj6nxDVPl" class="btn">Ver mapa</a>
</div>

<!-- DRESS CODE -->
<div class="section fade">
    <div class="dress">Dress Code</div>
    <p>Ropa casual y traje de baño</p>
</div>

<!-- RSVP -->
<div class="section fade">
    <h2>Confirma tu asistencia</h2>
    <div class="rsvp">
        <button onclick="window.open('https://wa.me/525661052234')">Sí asistiré</button>
        <button onclick="window.open('https://wa.me/525661052234')">No asistiré</button>
    </div>
</div>

<!-- FINAL -->
<div class="section fade">
    <h1>Te esperamos</h1>
</div>

<a class="whatsapp" href="https://wa.me/525661052234">💬</a>

<script>
// animaciones al hacer scroll
const faders = document.querySelectorAll('.fade');
window.addEventListener('scroll', ()=>{
    faders.forEach(el=>{
        const top = el.getBoundingClientRect().top;
        if(top < window.innerHeight - 100){
            el.classList.add('show');
        }
    });
});

// contador
const countDate = new Date("June 20, 2026 12:00:00").getTime();

setInterval(()=>{
    const now = new Date().getTime();
    const gap = countDate - now;

    const d = Math.floor(gap / (1000*60*60*24));
    const h = Math.floor((gap % (1000*60*60*24)) / (1000*60*60));
    const m = Math.floor((gap % (1000*60*60)) / (1000*60));
    const s = Math.floor((gap % (1000*60)) / 1000);

    document.getElementById("countdown").innerHTML =
    `${d}d ${h}h ${m}m ${s}s`;

},1000);
</script>

</body>
</html>
